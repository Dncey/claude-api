services:
  claude-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-api-server
    restart: unless-stopped
    ports:
      - "62312:62311"  # 宿主机 62312 映射到容器 62311
    volumes:
      # 持久化数据库文件（包含管理员密码、API Key 等系统设置）
      - ./data:/app/data
      # 可选：挂载配置文件（仅用于数据库连接等基础配置，默认使用 SQLite 无需此文件）
      # - ./config.yaml:/app/config.yaml:ro
    environment:
      # 服务端口
      - PORT=62311
      # 数据目录
      - DATA_DIR=/app/data
      # 禁用浏览器自动打开
      - NO_BROWSER=true
      # 时区设置
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:62311/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - claude-network

networks:
  claude-network:
    driver: bridge
